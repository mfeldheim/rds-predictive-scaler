name: Build and Push Multi-Arch Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: '1.25'

      - name: Run Go tests
        run: go test ./... -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Generate tag
        id: generate-tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          TAG_NAME="${TAG_NAME//\//-}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Determine if should push
        id: should-push
        run: |
          if [[ "${{ github.ref_type }}" == "tag" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Login to GitHub Container Registry
        if: steps.should-push.outputs.push == 'true'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.should-push.outputs.push == 'true'
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,scope=build-${{ matrix.platform }},mode=max
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mfeldheim/rds-predictive-scaler:latest,ghcr.io/mfeldheim/rds-predictive-scaler:${{ steps.generate-tag.outputs.tag }}

      - name: Build image (no push)
        if: steps.should-push.outputs.push == 'false'
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          push: false
